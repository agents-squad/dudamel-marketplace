name: PR Version Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh

      - name: Detect changed agents
        id: detect
        run: |
          base=$(git merge-base origin/main HEAD)
          agents=$(.github/scripts/detect-changed-agents.sh "$base" HEAD)
          echo "agents=$agents" >> "$GITHUB_OUTPUT"

      - name: Determine bump type
        if: steps.detect.outputs.agents != ''
        id: bump-type
        run: |
          # Check all PR commit messages for breaking changes
          base=$(git merge-base origin/main HEAD)
          if git log --format='%s' "$base"..HEAD | grep -qiE '(BREAKING:|major:)'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          else
            echo "type=minor" >> "$GITHUB_OUTPUT"
          fi

      - name: Build preview table
        if: steps.detect.outputs.agents != ''
        id: table
        run: |
          {
            echo "body<<EOF"
            echo "<!-- version-preview -->"
            echo "## Version Preview"
            echo ""
            echo "This PR will trigger the following version bumps on merge:"
            echo ""
            echo "| Agent | Current | New | Tag |"
            echo "|-------|---------|-----|-----|"
            for slug in ${{ steps.detect.outputs.agents }}; do
              current=$(grep '^version:' "$slug/agent.yaml" | sed 's/version: *"\(.*\)"/\1/')
              new=$(.github/scripts/bump-version.sh "$current" "${{ steps.bump-type.outputs.type }}")
              echo "| \`$slug\` | $current | **$new** | \`${slug}@${new}\` |"
            done
            echo ""
            echo "Bump type: **${{ steps.bump-type.outputs.type }}**"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: steps.detect.outputs.agents != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- version-preview -->';
            const body = `${{ steps.table.outputs.body }}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment no changes
        if: steps.detect.outputs.agents == ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- version-preview -->';
            const body = `${marker}\n## Version Preview\n\nNo agent changes detected in this PR. No version bumps will occur.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
