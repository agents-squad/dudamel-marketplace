name: PR Version Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  preview:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Make scripts executable
        run: chmod +x .github/scripts/*.sh

      - name: Detect changed agents
        id: detect-agents
        run: |
          base=$(git merge-base origin/main HEAD)
          agents=$(.github/scripts/detect-changed-agents.sh "$base" HEAD)
          echo "agents=$agents" >> "$GITHUB_OUTPUT"

      - name: Detect changed skills
        id: detect-skills
        run: |
          base=$(git merge-base origin/main HEAD)
          skills=$(.github/scripts/detect-changed-skills.sh "$base" HEAD)
          echo "skills=$skills" >> "$GITHUB_OUTPUT"

      - name: Determine bump type
        id: bump-type
        run: |
          base=$(git merge-base origin/main HEAD)
          if git log --format='%s' "$base"..HEAD | grep -qiE '(BREAKING:|major:)'; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          else
            echo "type=minor" >> "$GITHUB_OUTPUT"
          fi

      - name: Build preview table
        if: steps.detect-agents.outputs.agents != '' || steps.detect-skills.outputs.skills != ''
        id: table
        run: |
          {
            echo "body<<EOF"
            echo "<!-- version-preview -->"
            echo "## Version Preview"
            echo ""
            echo "This PR will trigger the following version bumps on merge:"

            # Agent table
            if [[ -n "${{ steps.detect-agents.outputs.agents }}" ]]; then
              echo ""
              echo "### Agents"
              echo ""
              echo "| Agent | Current | New | Tag |"
              echo "|-------|---------|-----|-----|"
              for slug in ${{ steps.detect-agents.outputs.agents }}; do
                current=$(grep '^version:' "agents/$slug/agent.yaml" | sed 's/version: *"\(.*\)"/\1/')
                new=$(.github/scripts/bump-version.sh "$current" "${{ steps.bump-type.outputs.type }}")
                echo "| \`$slug\` | $current | **$new** | \`${slug}@${new}\` |"
              done
            fi

            # Skill table
            if [[ -n "${{ steps.detect-skills.outputs.skills }}" ]]; then
              echo ""
              echo "### Skills"
              echo ""
              echo "| Skill | Current | New | Tag |"
              echo "|-------|---------|-----|-----|"
              for name in ${{ steps.detect-skills.outputs.skills }}; do
                current=$(sed -n '/^---$/,/^---$/{ /^version:/{ s/version: *"\(.*\)"/\1/p; } }' "skills/$name/SKILL.md")
                new=$(.github/scripts/bump-version.sh "$current" "${{ steps.bump-type.outputs.type }}")
                echo "| \`$name\` | $current | **$new** | \`skill/${name}@${new}\` |"
              done
            fi

            echo ""
            echo "Bump type: **${{ steps.bump-type.outputs.type }}**"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Comment on PR
        if: steps.detect-agents.outputs.agents != '' || steps.detect-skills.outputs.skills != ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- version-preview -->';
            const body = `${{ steps.table.outputs.body }}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Comment no changes
        if: steps.detect-agents.outputs.agents == '' && steps.detect-skills.outputs.skills == ''
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- version-preview -->';
            const body = `${marker}\n## Version Preview\n\nNo agent or skill changes detected in this PR. No version bumps will occur.`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
